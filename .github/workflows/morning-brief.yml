name: Morning Intelligence

on:
  schedule:
    - cron: "0 7 * * *"
      timezone: "Asia/Kolkata"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build the briefing without sending email"
        required: false
        type: boolean
        default: false
      ignore_history:
        description: "Allow previously delivered stories"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: morning-intelligence
  cancel-in-progress: false

jobs:
  deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      DIGEST_RECIPIENT: ${{ secrets.DIGEST_RECIPIENT }}

    steps:
      - name: Check out agent
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Restore agent memory
        uses: actions/cache@v4
        with:
          path: |
            data/state.json
            data/preferences.json
          key: news-agent-memory-${{ github.run_id }}
          restore-keys: |
            news-agent-memory-

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Verify configuration
        shell: python
        run: |
          import os
          import sys

          required = ["GMAIL_ADDRESS", "GMAIL_APP_PASSWORD", "DIGEST_RECIPIENT"]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              print("Missing GitHub Actions secrets: " + ", ".join(missing))
              sys.exit(2)

      - name: Build and deliver briefing
        shell: bash
        run: |
          args=()
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "${{ inputs.ignore_history }}" == "true" ]]; then
            args+=(--ignore-history)
          fi
          python main.py "${args[@]}"

      - name: Upload briefing and run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-intelligence-${{ github.run_id }}
          path: |
            output/latest_digest.html
            data/agent.log
          if-no-files-found: ignore
          retention-days: 7
